name: Loan Prediciton CI

on:
  push:
    branches:
       - main
       - master

  pull request:
    branches:
       - main
       - master

jobs:
  test:
    
    runs-on: ubuntu-latest

    steps:
     
    - name: Checkout Respository
      uses: actions/checkout@v4
      with:
        python-version: "3.11"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Tests
      run: |
        pytest -v